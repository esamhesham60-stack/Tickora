<!DOCTYPE html>
<html lang="en">
<head>
<script>(function(){try{var t=localStorage.getItem('tickora_theme');if(!t){t='dark';}document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TICKORA — My Account</title>
<link rel="icon" type="image/png" id="favicon" href="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Manrope:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/tickora.css?v=9">
<style>
.acct-section{padding:150px 0 100px;}
.acct-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; flex-wrap:wrap; gap:16px;}
.acct-head h1{font-size:clamp(26px,3vw,34px);}
.acct-logout{font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--bone-dim); background:none; border:1px solid var(--border); padding:10px 18px; cursor:pointer; transition:all .2s;}
.acct-logout:hover{border-color:var(--brass); color:var(--brass-light);}
.acct-email{color:var(--bone-dim); font-size:14px; margin-bottom:48px; font-family:'IBM Plex Mono',monospace;}
.acct-panel{margin-bottom:40px;}
.acct-panel h2{font-size:18px; margin-bottom:18px;}
.acct-table{width:100%; border-collapse:collapse; font-size:13.5px;}
.acct-table th{
  text-align:left; font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.05em; text-transform:uppercase;
  color:var(--bone-dim); padding:10px 14px; border-bottom:1px solid var(--border);
}
.acct-table td{padding:12px 14px; border-bottom:1px solid var(--border); color:var(--bone-dim);}
.acct-table tr:hover td{background:var(--panel-light);}
.acct-table .num{font-family:'IBM Plex Mono',monospace; color:var(--brass-light);}
.acct-table-wrap{overflow-x:auto; border:1px solid var(--border);}
.acct-empty{padding:40px; text-align:center; color:var(--bone-dim); font-size:14px;}
.acct-empty a{color:var(--brass-light); text-decoration:underline;}
.acct-gate{min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:24px;}
.acct-gate p{color:var(--bone-dim); font-size:15px;}
.acct-badge{
  display:inline-block; font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:0.04em;
  padding:3px 9px; text-transform:uppercase;
}
.acct-badge.quotation_click{background:rgba(37,211,102,0.15); color:#25D366;}
.acct-badge.add_to_cart{background:rgba(188,138,84,0.15); color:var(--brass-light);}
</style>
</head>
<body>

<div id="gate" class="acct-gate">
  <p>Checking your account…</p>
</div>

<div id="acctContent" style="display:none;">
<nav id="nav">
  <div class="container nav-inner">
    <a href="index.html#top" class="brand">
      <img src="" alt="TICKORA" class="logo-mark" id="navLogoImg">
      <span class="brand-word">TICKORA</span>
    </a>
    <div class="nav-links" id="navLinks">
      <a href="index.html#shop">Shop</a>
      <a href="index.html#story">Story</a>
      <a href="index.html#leadership">Leadership</a>
    </div>
    <div class="nav-actions">
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <button class="cart-toggle" id="cartToggle" aria-label="Cart">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-badge" id="cartBadge" style="display:none">0</span>
      </button>
    </div>
    <button class="hamburger" id="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
  </div>
</nav>

<section class="acct-section">
  <div class="container">
    <div class="acct-head">
      <h1 id="acctGreeting">My Account</h1>
      <button class="acct-logout" id="logoutBtn">Log Out</button>
    </div>
    <div class="acct-email" id="acctEmail"></div>

    <div class="acct-panel">
      <h2>Your Activity</h2>
      <div class="acct-table-wrap">
        <table class="acct-table">
          <thead><tr><th>When</th><th>Action</th><th>Watch</th></tr></thead>
          <tbody id="activityTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</section>
</div>

<script src="assets/js/brand.js?v=2"></script>
<script src="assets/js/theme.js?v=1"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js?v=2"></script>
<script src="assets/js/products-data.js?v=6"></script>
<script src="assets/js/analytics.js?v=2"></script>
<script src="assets/js/cart.js?v=4"></script>
<script>
document.getElementById('favicon').href = LOGO_SRC;

const navEl = document.getElementById('nav');
window.addEventListener('scroll', () => navEl && navEl.classList.toggle('scrolled', window.scrollY > 40));

function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleString('en-GB', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
}
function actionLabel(type) {
  return type === 'quotation_click' ? 'Requested Quotation' : type === 'add_to_cart' ? 'Added to Cart' : type;
}

async function loadAccount() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) { location.href = 'account.html'; return; }

  let fullName = '';
  try {
    const { data: profile } = await supabaseClient
      .from('profiles').select('full_name').eq('id', session.user.id).single();
    fullName = (profile && profile.full_name) || '';
  } catch (e) { /* ignore */ }

  document.getElementById('gate').style.display = 'none';
  document.getElementById('acctContent').style.display = 'block';
  document.getElementById('navLogoImg').src = LOGO_SRC;
  document.getElementById('acctGreeting').textContent = fullName ? `Welcome, ${fullName}` : 'My Account';
  document.getElementById('acctEmail').textContent = session.user.email;

  const hamburger = document.getElementById('hamburger');
  const navLinks = document.getElementById('navLinks');
  hamburger.addEventListener('click', () => navLinks.classList.toggle('open'));

  const { data: rows } = await supabaseClient
    .from('events').select('event_type, product_name, created_at')
    .eq('user_id', session.user.id)
    .in('event_type', ['quotation_click', 'add_to_cart'])
    .order('created_at', { ascending: false })
    .limit(100);

  const body = document.getElementById('activityTableBody');
  if (!rows || rows.length === 0) {
    body.innerHTML = `<tr><td colspan="3" class="acct-empty">No activity yet — browse the <a href="index.html#shop">collection</a> to get started.</td></tr>`;
  } else {
    body.innerHTML = rows.map(r => `
      <tr>
        <td class="mono">${fmtDate(r.created_at)}</td>
        <td><span class="acct-badge ${r.event_type}">${actionLabel(r.event_type)}</span></td>
        <td>${r.product_name || '—'}</td>
      </tr>`).join('');
  }
}

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await supabaseClient.auth.signOut();
  location.href = 'index.html';
});

loadAccount();
</script>
</body>
</html>
