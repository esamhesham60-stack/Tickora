<!DOCTYPE html>
<html lang="en">
<head>
<script>(function(){try{var t=localStorage.getItem('tickora_theme');if(!t){t='dark';}document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TICKORA — Reset Password</title>
<link rel="icon" type="image/png" id="favicon" href="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Manrope:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/tickora.css?v=8">
<style>
.auth-section{min-height:100vh; min-height:100svh; display:flex; align-items:center; padding:140px 0 60px;}
.auth-card{max-width:420px; margin:0 auto; background:var(--panel); border:1px solid var(--border); padding:40px;}
.auth-card h2{font-size:22px; margin-bottom:8px;}
.auth-card .sub{color:var(--bone-dim); font-size:13.5px; margin-bottom:26px;}
.auth-field{margin-bottom:16px;}
.auth-field label{display:block; font-family:'IBM Plex Mono',monospace; font-size:11.5px; letter-spacing:0.04em; text-transform:uppercase; color:var(--bone-dim); margin-bottom:8px;}
.auth-field input{
  width:100%; background:var(--ink); border:1px solid var(--border); color:var(--bone);
  padding:13px 14px; font-family:'Manrope',sans-serif; font-size:14px;
}
.auth-field input:focus{outline:none; border-color:var(--brass);}
.auth-submit{width:100%; margin-top:6px;}
.auth-msg{margin-top:16px; font-size:13px; font-family:'IBM Plex Mono',monospace; padding:12px 14px; display:none;}
.auth-msg.error{display:block; background:rgba(200,80,80,0.12); color:#e08a8a; border:1px solid rgba(200,80,80,0.3);}
.auth-msg.success{display:block; background:rgba(124,156,135,0.12); color:var(--sage); border:1px solid rgba(124,156,135,0.3);}
</style>
</head>
<body>

<nav id="nav">
  <div class="container nav-inner">
    <a href="index.html#top" class="brand">
      <img src="" alt="TICKORA" class="logo-mark" id="navLogoImg">
      <span class="brand-word">TICKORA</span>
    </a>
    <div class="nav-links" id="navLinks"></div>
    <button class="hamburger" id="hamburger" aria-label="Menu" style="visibility:hidden;"><span></span><span></span><span></span></button>
  </div>
</nav>

<section class="auth-section">
  <div class="container">
    <div class="auth-card">
      <div id="checkingState">
        <h2>Checking your link…</h2>
        <p class="sub">One moment.</p>
      </div>

      <form id="resetForm" style="display:none;">
        <h2>Set a new password</h2>
        <p class="sub">Choose a new password for your TICKORA account.</p>
        <div class="auth-field">
          <label for="newPassword">New Password</label>
          <input type="password" id="newPassword" required minlength="6" autocomplete="new-password">
        </div>
        <div class="auth-field">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" required minlength="6" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary auth-submit">Update Password</button>
        <div class="auth-msg" id="resetMsg"></div>
      </form>

      <div id="invalidState" style="display:none;">
        <h2>This link isn't valid</h2>
        <p class="sub">It may have expired. Request a new reset link from the <a href="account.html" style="color:var(--brass-light)">login page</a>.</p>
      </div>
    </div>
  </div>
</section>

<script src="assets/js/brand.js?v=2"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js?v=2"></script>
<script>
document.getElementById('favicon').href = LOGO_SRC;
document.getElementById('navLogoImg').src = LOGO_SRC;

const checkingState = document.getElementById('checkingState');
const resetForm = document.getElementById('resetForm');
const invalidState = document.getElementById('invalidState');

supabaseClient.auth.onAuthStateChange((event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    checkingState.style.display = 'none';
    resetForm.style.display = 'block';
  }
});

// fallback: if we already have a session shortly after load (recovery link already processed), show the form too
setTimeout(async () => {
  if (resetForm.style.display === 'block') return;
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (session) {
    checkingState.style.display = 'none';
    resetForm.style.display = 'block';
  } else {
    checkingState.style.display = 'none';
    invalidState.style.display = 'block';
  }
}, 2500);

resetForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = document.getElementById('resetMsg');
  const p1 = document.getElementById('newPassword').value;
  const p2 = document.getElementById('confirmPassword').value;
  if (p1 !== p2) {
    msg.textContent = 'Passwords do not match.';
    msg.className = 'auth-msg error';
    return;
  }
  const { error } = await supabaseClient.auth.updateUser({ password: p1 });
  if (error) {
    msg.textContent = error.message;
    msg.className = 'auth-msg error';
    return;
  }
  msg.textContent = 'Password updated — redirecting to sign in...';
  msg.className = 'auth-msg success';
  await supabaseClient.auth.signOut();
  setTimeout(() => { location.href = 'account.html'; }, 1800);
});
</script>
</body>
</html>
