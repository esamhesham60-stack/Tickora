<!DOCTYPE html>
<html lang="en" data-i18n-page>
<head>
<script>(function(){try{var t=localStorage.getItem('tickora_theme');if(!t){t='dark';}document.documentElement.setAttribute('data-theme',t);var l=localStorage.getItem('tickora_lang')||'en';document.documentElement.setAttribute('lang',l);}catch(e){}})();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TICKORA — Account</title>
<meta name="description" content="Sign in or create a TICKORA account.">
<link rel="icon" type="image/png" id="favicon" href="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Manrope:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Cairo:wght@600;700&family=Tajawal:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/tickora.css?v=8">
<style>
.auth-section{min-height:100vh; min-height:100svh; display:flex; align-items:center; padding:140px 0 60px;}
.auth-card{max-width:420px; margin:0 auto; background:var(--panel); border:1px solid var(--border); padding:40px;}
.auth-tabs{display:flex; border:1px solid var(--border); margin-bottom:28px;}
.auth-tab{flex:1; text-align:center; padding:12px; font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:14px; color:var(--bone-dim); cursor:pointer; background:none; border:none; transition:all .2s;}
.auth-tab.active{background:var(--brass); color:var(--ink);}
.auth-card h2{font-size:22px; margin-bottom:8px;}
.auth-card .sub{color:var(--bone-dim); font-size:13.5px; margin-bottom:26px;}
.auth-field{margin-bottom:16px;}
.auth-field label{display:block; font-family:'IBM Plex Mono',monospace; font-size:11.5px; letter-spacing:0.04em; text-transform:uppercase; color:var(--bone-dim); margin-bottom:8px;}
.auth-field input{
  width:100%; background:var(--ink); border:1px solid var(--border); color:var(--bone);
  padding:13px 14px; font-family:'Manrope',sans-serif; font-size:14px;
}
.auth-field input:focus{outline:none; border-color:var(--brass);}
.auth-submit{width:100%; margin-top:6px;}
.auth-forgot{
  display:block; width:100%; text-align:center; background:none; border:none; cursor:pointer;
  color:var(--bone-dim); font-family:'IBM Plex Mono',monospace; font-size:12.5px; margin-top:14px; text-decoration:underline;
}
.auth-forgot:hover{color:var(--brass-light);}
.auth-msg{margin-top:16px; font-size:13px; font-family:'IBM Plex Mono',monospace; padding:12px 14px; display:none;}
.auth-msg.error{display:block; background:rgba(200,80,80,0.12); color:#e08a8a; border:1px solid rgba(200,80,80,0.3);}
.auth-msg.success{display:block; background:rgba(124,156,135,0.12); color:var(--sage); border:1px solid rgba(124,156,135,0.3);}
.auth-form{display:none;}
.auth-form.active{display:block;}
</style>
</head>
<body>

<nav id="nav">
  <div class="container nav-inner">
    <a href="index.html#top" class="brand">
      <img src="" alt="TICKORA" class="logo-mark" id="navLogoImg">
      <span class="brand-word">TICKORA</span>
    </a>
    <div class="nav-links" id="navLinks">
      <a href="index.html#shop">Shop</a>
      <a href="index.html#reviews">Reviews</a>
      <a href="index.html#story">Story</a>
      <a href="index.html#leadership">Leadership</a>
      <a href="index.html#why">Details</a>
      <a href="index.html#contact">Contact</a>
      <a href="index.html#shop" class="btn btn-primary">Shop Now</a>
    </div>
    <div class="nav-actions">      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <button class="lang-toggle" id="langToggle" aria-label="Toggle language">AR</button>
      <button class="cart-toggle" id="cartToggle" aria-label="Cart">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-badge" id="cartBadge" style="display:none">0</span>
      </button>
    </div>
    <button class="hamburger" id="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
  </div>
</nav>

<section class="auth-section">
  <div class="container">
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin">Login</button>
        <button class="auth-tab" id="tabSignup">Sign Up</button>
      </div>

      <form class="auth-form active" id="loginForm">
        <h2>Welcome back</h2>
        <p class="sub">Log in to track your quotations and orders.</p>
        <div class="auth-field">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" required autocomplete="email">
        </div>
        <div class="auth-field">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary auth-submit">Log In</button>
        <button type="button" class="auth-forgot" id="forgotPasswordBtn">Forgot password?</button>
        <div class="auth-msg" id="loginMsg"></div>
      </form>

      <div class="auth-form" id="forgotForm">
        <h2>Reset your password</h2>
        <p class="sub">Enter your email and we'll send you a link to set a new password.</p>
        <div class="auth-field">
          <label for="forgotEmail">Email</label>
          <input type="email" id="forgotEmail" required autocomplete="email">
        </div>
        <button type="button" class="btn btn-primary auth-submit" id="sendResetBtn">Send Reset Link</button>
        <button type="button" class="auth-forgot" id="backToLoginBtn">&larr; Back to login</button>
        <div class="auth-msg" id="forgotMsg"></div>
      </div>

      <form class="auth-form" id="signupForm">
        <h2>Create your account</h2>
        <p class="sub">Get 10% off your first watch and faster quotations.</p>
        <div class="auth-field">
          <label for="signupName">Full Name</label>
          <input type="text" id="signupName" required autocomplete="name">
        </div>
        <div class="auth-field">
          <label for="signupEmail">Email</label>
          <input type="email" id="signupEmail" required autocomplete="email">
        </div>
        <div class="auth-field">
          <label for="signupPassword">Password</label>
          <input type="password" id="signupPassword" required minlength="6" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary auth-submit">Sign Up</button>
        <div class="auth-msg" id="signupMsg"></div>
      </form>
    </div>
  </div>
</section>

<script src="assets/js/brand.js?v=2"></script>
<script src="assets/js/theme.js?v=1"></script>
<script src="assets/js/i18n.js?v=4"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js?v=2"></script>
<script src="assets/js/products-data.js?v=4"></script>
<script src="assets/js/analytics.js?v=2"></script>
<script src="assets/js/cart.js?v=2"></script>
<script>
document.getElementById('favicon').href = LOGO_SRC;
document.getElementById('navLogoImg').src = LOGO_SRC;

const navEl = document.getElementById('nav');
window.addEventListener('scroll', () => navEl.classList.toggle('scrolled', window.scrollY > 40));
const hamburger = document.getElementById('hamburger');
const navLinks = document.getElementById('navLinks');
hamburger.addEventListener('click', () => navLinks.classList.toggle('open'));
navLinks.querySelectorAll('a').forEach(a => a.addEventListener('click', () => navLinks.classList.remove('open')));

const tabLogin = document.getElementById('tabLogin');
const tabSignup = document.getElementById('tabSignup');
const loginForm = document.getElementById('loginForm');
const signupForm = document.getElementById('signupForm');
tabLogin.addEventListener('click', () => {
  tabLogin.classList.add('active'); tabSignup.classList.remove('active');
  loginForm.classList.add('active'); signupForm.classList.remove('active');
  forgotForm.classList.remove('active');
});
tabSignup.addEventListener('click', () => {
  tabSignup.classList.add('active'); tabLogin.classList.remove('active');
  signupForm.classList.add('active'); loginForm.classList.remove('active');
  forgotForm.classList.remove('active');
});

const forgotForm = document.getElementById('forgotForm');
document.getElementById('forgotPasswordBtn').addEventListener('click', () => {
  loginForm.classList.remove('active');
  forgotForm.classList.add('active');
});
document.getElementById('backToLoginBtn').addEventListener('click', () => {
  forgotForm.classList.remove('active');
  loginForm.classList.add('active');
});
document.getElementById('sendResetBtn').addEventListener('click', async () => {
  const msg = document.getElementById('forgotMsg');
  const email = document.getElementById('forgotEmail').value.trim();
  if (!email) { showMsg(msg, t('msgEnterEmail'), 'error'); return; }
  const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
    redirectTo: location.origin + '/reset-password.html'
  });
  if (error) { showMsg(msg, error.message, 'error'); return; }
  showMsg(msg, t('msgResetSent'), 'success');
});

function showMsg(el, text, kind) {
  el.textContent = text;
  el.className = 'auth-msg ' + kind;
}

async function redirectAfterLogin() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) return;
  let isAdmin = false;
  try {
    const { data: profile } = await supabaseClient
      .from('profiles').select('is_admin').eq('id', session.user.id).single();
    isAdmin = !!(profile && profile.is_admin);
  } catch (e) { /* ignore */ }
  location.href = isAdmin ? 'admin.html' : 'index.html';
}

loginForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = document.getElementById('loginMsg');
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
  if (error) { showMsg(msg, error.message, 'error'); return; }
  showMsg(msg, t('msgLoggedIn'), 'success');
  redirectAfterLogin();
});

signupForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = document.getElementById('signupMsg');
  const fullName = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;
  const { data, error } = await supabaseClient.auth.signUp({
    email, password,
    options: { data: { full_name: fullName } }
  });
  if (error) { showMsg(msg, error.message, 'error'); return; }
  if (data.session) {
    showMsg(msg, t('msgAccountCreated'), 'success');
    redirectAfterLogin();
  } else {
    showMsg(msg, t('msgCheckEmail'), 'success');
  }
});
</script>
</body>
</html>
